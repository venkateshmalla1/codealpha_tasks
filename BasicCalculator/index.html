<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Calculator</title>
    <!-- Bootstrap 4.6 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column align-items-center justify-content-center vh-100">
    <h1 class="highlight-heading fw-bold mt-3 mb-1 text-center">Calculator</h1>
    <div class="calculator card shadow-lg border-0 m-4">
        <div class="card-body p-0">
            <!-- Display Screen -->
            <div class="display bg-dark text-white p-2 text-right">
                <div id="previous-operand" class="text-muted small" style="min-height: 20px;"></div>
                <div id="current-operand" class="h2 mb-0" style="min-height: 38px;">0</div>
            </div>
            <!-- Calculator Buttons -->
            <div class="buttons p-2 pb-3">
                <div class="row no-gutters">
                    <div class="col-6 p-1"><button class="btn btn-danger btn-block custom-btn shadow-sm" data-all-clear>AC</button></div>
                    <div class="col-3 p-1"><button class="btn btn-warning btn-block custom-btn shadow-sm" data-delete>Del</button></div>
                    <div class="col-3 p-1"><button class="btn btn-info btn-block custom-btn shadow-sm" data-operation>÷</button></div>
                </div>
                <div class="row no-gutters">
                    <div class="col-3 p-1"><button class="btn btn-light btn-block custom-btn shadow-sm" data-number>7</button></div>
                    <div class="col-3 p-1"><button class="btn btn-light btn-block custom-btn shadow-sm" data-number>8</button></div>
                    <div class="col-3 p-1"><button class="btn btn-light btn-block custom-btn shadow-sm" data-number>9</button></div>
                    <div class="col-3 p-1"><button class="btn btn-info btn-block custom-btn shadow-sm" data-operation>×</button></div>
                </div>
                <div class="row no-gutters">
                    <div class="col-3 p-1"><button class="btn btn-light btn-block custom-btn shadow-sm" data-number>4</button></div>
                    <div class="col-3 p-1"><button class="btn btn-light btn-block custom-btn shadow-sm" data-number>5</button></div>
                    <div class="col-3 p-1"><button class="btn btn-light btn-block custom-btn shadow-sm" data-number>6</button></div>
                    <div class="col-3 p-1"><button class="btn btn-info btn-block custom-btn shadow-sm" data-operation>-</button></div>
                </div>
                <div class="row no-gutters">
                    <div class="col-3 p-1"><button class="btn btn-light btn-block custom-btn shadow-sm" data-number>1</button></div>
                    <div class="col-3 p-1"><button class="btn btn-light btn-block custom-btn shadow-sm" data-number>2</button></div>
                    <div class="col-3 p-1"><button class="btn btn-light btn-block custom-btn shadow-sm" data-number>3</button></div>
                    <div class="col-3 p-1"><button class="btn btn-info btn-block custom-btn shadow-sm" data-operation>+</button></div>
                </div>
                <div class="row no-gutters">
                    <div class="col-6 p-1"><button class="btn btn-light btn-block custom-btn shadow-sm" data-number>0</button></div>
                    <div class="col-3 p-1"><button class="btn btn-light btn-block custom-btn shadow-sm" data-number>.</button></div>
                    <div class="col-3 p-1"><button class="btn btn-success btn-block custom-btn shadow-sm" data-equals>=</button></div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
